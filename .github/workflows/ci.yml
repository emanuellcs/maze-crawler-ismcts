# CI/CD for the Maze Crawler fixed-buffer ISMCTS engine.
#
# The workflow validates both deployment modes:
# - CMake builds the native pybind11 extension for local/CI use.
# - The packaged source bundle is exercised through `main.py` so Kaggle-style
#   JIT compilation remains healthy.
name: CI/CD

on:
  # Pull requests and mainline pushes must keep the simulator, pybind bridge,
  # ISMCTS search, and packaging path regression-clean.
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  # Cancel stale runs on the same ref so expensive native builds do not pile up.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # Default jobs only need read access; tag releases elevate permissions below.
  contents: read

env:
  # Release mode enables the same `-O3 -march=native -ffast-math -DNDEBUG`
  # settings documented in CMakeLists.txt.
  CMAKE_BUILD_TYPE: Release

jobs:
  build-test:
    name: Build and test (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      # Test both supported Python ABIs even when one matrix leg fails.
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          # pybind11 is needed for CMake discovery; pytest/numpy exercise the
          # bridge and deterministic simulator fixtures.
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Configure CMake
        run: |
          # Bind CMake to the matrix Python interpreter so the extension ABI
          # matches the subsequent smoke and pytest commands.
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DPython3_EXECUTABLE="$(python -c 'import sys; print(sys.executable)')"

      - name: Build C++ extension
        run: cmake --build build -j"$(nproc)"

      - name: Run smoke script
        run: PYTHONPATH=build python test.py

      - name: Run pytest suite
        run: PYTHONPATH=build python -m pytest -q test.py

      - name: Verify Kaggle entrypoint imports
        run: |
          # This smoke call proves `main.agent` can load the native module from
          # PYTHONPATH=build and emit a Kaggle-compatible action dictionary.
          PYTHONPATH=build python - <<'PY'
          from types import SimpleNamespace
          from main import agent

          obs = SimpleNamespace(
              player=0,
              walls=[0] * 400,
              crystals={},
              robots={"f0": [0, 5, 2, 1000, 0, 0, 0, 0]},
              mines={},
              miningNodes={},
              southBound=0,
              northBound=19,
              step=0,
          )
          config = SimpleNamespace(width=20, workerCost=200, wallRemoveCost=100)
          actions = agent(obs, config)
          assert isinstance(actions, dict)
          assert "f0" in actions
          PY

      - name: Upload compiled extension artifact
        uses: actions/upload-artifact@v4
        with:
          # Retain the compiled extension and compile database for debugging
          # native search or simulator regressions from CI artifacts.
          name: crawler-engine-ubuntu-py${{ matrix.python-version }}
          path: |
            build/crawler_engine*.so
            build/compile_commands.json
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package source bundle
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create source package
        run: |
          # Source artifact excludes transient build/test directories and VCS
          # metadata while preserving the documented repository layout.
          mkdir -p dist
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            -czf dist/maze-crawler-ismcts-source.tar.gz .

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: maze-crawler-ismcts-source
          path: dist/maze-crawler-ismcts-source.tar.gz
          if-no-files-found: error
          retention-days: 30

  release-artifacts:
    name: Publish tag artifacts
    runs-on: ubuntu-latest
    needs:
      - build-test
      - package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      # Tag builds publish a GitHub release bundle, so write access is scoped to
      # this job only.
      contents: write

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release artifacts
        run: find release-artifacts -maxdepth 3 -type f -print | sort

      - name: Create release bundle
        run: tar -czf "release-${GITHUB_REF_NAME}.tar.gz" -C release-artifacts .

      - name: Upload tagged artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: release-${{ github.ref_name }}.tar.gz
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Create the release lazily and update the bundled artifact in-place so
          # reruns of the same tag remain idempotent.
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Automated release for ${GITHUB_REF_NAME}."
          fi
          gh release upload "${GITHUB_REF_NAME}" "release-${GITHUB_REF_NAME}.tar.gz" --clobber
